<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer - Grid Aligned</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --grid-max-width: 1400px;
            --grid-columns: 12;
            --grid-gutter: 20px;

            --color-bg: #FAF8F0;
            --color-surface: #F5F3EB;
            --color-text: #1a1a1a;
            --color-text-secondary: #666;
            --font-display: 'Anton', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-mono);
            background: var(--color-bg);
            color: var(--color-text);
            padding: 40px 20px;
        }

        /* Grid Toggle */
        .grid-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 16px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 12px;
            cursor: pointer;
            z-index: 10000;
        }

        /* Grid Overlay - must match content grid exactly */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            grid-template-columns: repeat(12, 1fr);
            gap: var(--grid-gutter);
            pointer-events: none;
            z-index: 9999;
        }

        .grid-overlay.visible { display: grid; }

        .grid-overlay .col {
            background: rgba(255, 0, 0, 0.08);
            border-left: 1px solid rgba(255, 0, 0, 0.2);
            border-right: 1px solid rgba(255, 0, 0, 0.2);
        }

        /* Footer Container */
        .footer {
            position: relative;
            background: var(--color-surface);
            padding: 35px 20px 60px;
        }

        /* THE GRID - 12 columns, 20px gap, 1340px max */
        .grid {
            position: relative; /* Required for overlay positioning */
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: var(--grid-gutter);
            max-width: var(--grid-max-width);
            margin: 0 auto;
        }

        /* ===========================================
           GRID PLACEMENT - explicit column assignments
           =========================================== */

        /* Row 1: Logo spans cols 1-3 */
        .footer-logo {
            grid-column: 1 / 4;
            grid-row: 1;
            align-self: start;
        }
        .footer-logo img { height: 48px; }

        /* Row 1: Nav links span cols 11-12, right-aligned */
        .footer-nav {
            grid-column: 11 / 13;
            grid-row: 1 / 4;
            text-align: right;
            align-self: start;
        }
        .footer-nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 38px;
        }
        .footer-nav a {
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            text-transform: uppercase;
            transition: color 0.15s ease;
            line-height: 1;
            display: block;
        }
        .footer-nav a:hover {
            color: #FE4500;
        }

        /* Row 2: CTA block spans cols 1-4 */
        .footer-cta {
            grid-column: 1 / 5;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 400px;
        }

        .footer-headline {
            font-family: var(--font-display);
            font-weight: 400;
            font-size: 1.5rem;
            color: var(--color-text);
            margin: 14px 0 0 0; /* Align with PRIVACY link */
            line-height: 1.1;
            text-transform: uppercase;
        }

        .footer-subline {
            font-family: var(--font-mono);
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            margin: 20px 0 0 0;
        }

        .footer-npm {
            margin-top: 20px;
        }

        /* Row 1: Social icons - one per column (cols 5-10), aligned with logo and nav */
        .social-icon {
            grid-row: 1;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }
        .social-5 { grid-column: 5; }
        .social-6 { grid-column: 6; }
        .social-7 { grid-column: 7; }
        .social-8 { grid-column: 8; }
        .social-9 { grid-column: 9; }
        .social-10 { grid-column: 10; }

        /* Social link styling */
        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            color: var(--color-text-secondary);
            background: var(--color-bg);
            transition: all 0.15s ease;
        }
        .social-link:hover {
            color: var(--color-text);
            background: #e8e6de;
            transform: translateY(-2px);
        }
        .social-link svg {
            width: 28px;
            height: 28px;
        }

        /* Row 3: HR and Copyright - full width, right-aligned */
        .footer-bottom {
            grid-column: 1 / 13;
            grid-row: 3;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #ddd;
            text-align: right;
        }

        .footer-copyright {
            font-size: 12px;
            color: var(--color-text-secondary);
        }

        /* NPM Compact Button (matches live site) */
        .npm-compact-btn {
            display: inline-flex;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 0.8125rem;
            background: var(--color-bg);
            border: 2px solid transparent;
            background-image: linear-gradient(var(--color-bg), var(--color-bg)),
                              linear-gradient(90deg, #FDC400, #FC9500, #FE4500, #E00256, #A70086);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            padding: 8px 6px 8px 8px;
            gap: 12px;
            border-radius: 8px;
            height: 56px;
            cursor: pointer;
        }
        .npm-prompt { color: #FC9500; }
        .npm-command { color: var(--color-text); }
        .npm-copy-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #F4F0E0;
            color: #FE4500;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .npm-compact-btn:hover .npm-copy-icon {
            background: #FE4500;
            color: white;
        }

        /* Column indicator labels */
        .col-label {
            position: absolute;
            top: -20px;
            left: 0;
            font-size: 10px;
            color: #999;
            font-family: var(--font-mono);
        }
    </style>
</head>
<body>
    <button class="grid-toggle" onclick="document.getElementById('gridOverlay').classList.toggle('visible')">Toggle Grid</button>

    <div class="footer">

            <!-- Grid Overlay - inside the grid container so it aligns exactly -->

                <div class="col"></div><div class="col"></div><div class="col"></div><div class="col"></div>

            </div>
            <!-- Col 1-3: Logo -->
            <a href="/" class="footer-logo">

                            </svg>
                        </span>

            </div>

            <div class="social-icon social-10"><a href="#" class="social-link"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a></div>

            <!-- Col 11-12: Nav links -->
            <nav class="footer-nav">
                <ul>
                    <li><a href="#">Contact</a></li>
                    <li><a href="#">Support</a></li>
                    <li><a href="#">Privacy</a></li>
                    <li><a href="#">Terms</a></li>
                </ul>
            </nav>

            <!-- Full width: HR and Copyright, right-aligned -->
            <div class="footer-bottom">
                <p class="footer-copyright">&copy;2026 ginko. All rights reserved.</p>
            </div>
        </div>
    </div>
</body>
</html>
